<svg width="64" height="64" viewBox="0 0 64 64" fill="none"
  xmlns="http://www.w3.org/2000/svg">
  <title>UI/UX &amp; Front-End</title>
  <desc>Monitor con layout y lápiz, estilo lineal sobre fondo de tarjeta.</desc>
  <defs>
    <linearGradient id="acc1" x1="16" y1="16" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ds1" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- halo -->
  <circle cx="32" cy="32" r="16" fill="url(#acc1)" opacity=".18" filter="url(#glow1)"/>

  <!-- monitor -->
  <rect x="14" y="18" width="36" height="24" rx="5"
    stroke="white" stroke-width="2.25" vector-effect="non-scaling-stroke"
    fill="none" filter="url(#ds1)"/>
  <line x1="14" y1="26" x2="50" y2="26" stroke="white" stroke-width="2.25"
    vector-effect="non-scaling-stroke" opacity=".35"/>
  <rect x="19" y="21" width="10" height="3.5" rx="1.75" fill="white" opacity=".85"/>
  <rect x="31" y="21" width="15" height="3.5" rx="1.75" fill="white" opacity=".5"/>

  <!-- lápiz -->
  <path d="M22 42l8-8 4 4-8 8-5 1 1-5Z" fill="url(#acc1)"
    stroke="white" stroke-width="2" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
</svg>


